<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Studio V11 - Smart Content & Color</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Be+Vietnam+Pro:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --theme: #3b82f6; }
        body { background: #020617; color: #f8fafc; font-family: 'Be Vietnam Pro', sans-serif; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); border-right: 1px solid rgba(255,255,255,0.05); }
        .poster-stage { width: 450px; height: 636px; background: #000; position: relative; overflow: hidden; transition: all 0.5s; }
        input, textarea { background: #0f172a !important; border: 1px solid #1e293b !important; color: white !important; font-size: 11px !important; border-radius: 8px !important; padding: 10px !important; }
        .label-s { font-size: 9px; text-transform: uppercase; color: #64748b; font-weight: 800; margin-bottom: 4px; display: block; }
        .theme-text { color: var(--theme); transition: color 0.5s; }
        .theme-bg { background-color: var(--theme); transition: background 0.5s; }
        .theme-border { border-color: var(--theme); transition: border-color 0.5s; }
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; }
    </style>
</head>
<body class="flex h-screen">

    <aside class="w-[380px] glass p-5 flex flex-col h-full z-20">
        <div class="mb-4">
            <h1 class="text-xl font-black theme-text">AI DESIGN V11</h1>
            <p class="text-[9px] text-slate-500 uppercase font-bold tracking-widest">Auto Content & Auto Color</p>
        </div>

        <div class="flex-1 overflow-y-auto pr-2 custom-scroll space-y-4">
            <section class="bg-blue-500/10 p-3 rounded-xl border border-blue-500/20">
                <label class="label-s text-blue-400">Nhập vị trí để AI đề xuất nội dung</label>
                <div class="flex gap-2">
                    <input type="text" id="inJob" class="flex-1" placeholder="Vd: Kế toán, Nhân sự, IT..." oninput="updatePoster()">
                    <button onclick="suggestContent()" class="theme-bg px-3 rounded-lg text-[10px] font-black uppercase">Đề xuất</button>
                </div>
            </section>

            <div class="grid grid-cols-2 gap-2">
                <div><label class="label-s">Mức lương</label><input type="text" id="inSalary" class="w-full" oninput="updatePoster()"></div>
                <div><label class="label-s">Số lượng</label><input type="text" id="inQty" class="w-full" oninput="updatePoster()"></div>
            </div>

            <div><label class="label-s">Mô tả công việc</label><textarea id="inDesc" class="w-full h-16" oninput="updatePoster()"></textarea></div>
            <div><label class="label-s">Yêu cầu</label><textarea id="inReq" class="w-full h-16" oninput="updatePoster()"></textarea></div>
            <div><label class="label-s">Quyền lợi</label><textarea id="inBenefit" class="w-full h-16" oninput="updatePoster()"></textarea></div>

            <div class="grid grid-cols-2 gap-2">
                <div><label class="label-s">Tên đơn vị</label><input type="text" id="inCompany" class="w-full" oninput="updatePoster()"></div>
                <div><label class="label-s">Hotline</label><input type="text" id="inPhone" class="w-full" oninput="updatePoster()"></div>
            </div>

            <div class="pt-2 border-t border-slate-800">
                <label class="label-s theme-text">🤖 Tìm hình nền & Tự phối màu</label>
                <div class="flex gap-1">
                    <input type="text" id="aiKey" class="flex-1" placeholder="Chủ đề ảnh...">
                    <button onclick="generateAI()" class="bg-indigo-600 px-4 rounded-lg text-[10px] font-bold">GENERATE</button>
                </div>
            </div>
        </div>

        <button onclick="download()" class="mt-4 w-full theme-bg py-4 rounded-xl font-black text-xs uppercase tracking-widest hover:brightness-110">Xuất Poster 4K</button>
    </aside>

    <main class="flex-1 bg-black flex items-center justify-center p-4">
        <div id="poster" class="poster-stage">
            <img id="pBg" src="https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=1000" class="absolute inset-0 w-full h-full object-cover opacity-60 transition-opacity duration-1000" crossorigin="anonymous">
            <div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent"></div>

            <div class="relative z-10 p-10 h-full flex flex-col text-white">
                <div id="outCompany" class="theme-text font-bold text-[10px] uppercase tracking-[4px] mb-1">Tên đơn vị của bạn</div>
                <div class="h-0.5 w-10 theme-bg mb-8"></div>
                
                <h1 id="outJob" class="text-4xl font-black leading-[1.1] mb-2 uppercase" style="font-family: 'Montserrat'">VỊ TRÍ TUYỂN DỤNG</h1>
                
                <div class="flex gap-2 mb-8">
                    <span class="theme-bg text-black text-[9px] font-black px-3 py-1 rounded-sm uppercase" id="outSalary">Thỏa thuận</span>
                    <span class="bg-white/10 border border-white/20 text-white text-[9px] font-bold px-3 py-1 rounded-sm" id="outQty">-- Người</span>
                </div>

                <div class="space-y-4 flex-1">
                    <div>
                        <h4 class="text-[9px] font-black theme-text uppercase mb-1">▪ Mô tả công việc</h4>
                        <p id="outDesc" class="text-[11px] text-slate-300 leading-relaxed pl-3 whitespace-pre-line">Đang chờ dữ liệu...</p>
                    </div>
                    <div>
                        <h4 class="text-[9px] font-black theme-text uppercase mb-1">▪ Yêu cầu</h4>
                        <p id="outReq" class="text-[11px] text-slate-300 leading-relaxed pl-3 whitespace-pre-line">Đang chờ dữ liệu...</p>
                    </div>
                    <div>
                        <h4 class="text-[9px] font-black theme-text uppercase mb-1">▪ Quyền lợi</h4>
                        <p id="outBenefit" class="text-[11px] text-slate-300 leading-relaxed pl-3 whitespace-pre-line">Đang chờ dữ liệu...</p>
                    </div>
                </div>

                <div class="mt-auto pt-6 border-t border-white/10 flex justify-between items-end">
                    <div class="text-right ml-auto">
                        <p class="text-[8px] uppercase text-white/40 mb-1">Liên hệ ngay</p>
                        <p id="outPhone" class="text-2xl font-black theme-text tracking-tighter">090.XXX.XXXX</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 1. DỮ LIỆU ĐỀ XUẤT NỘI DUNG (Mở rộng thoải mái)
        const suggestions = {
            "kế toán": { desc: "- Quản lý thu chi nội bộ\n- Lập báo cáo tài chính tháng/quý\n- Kiểm soát hóa đơn chứng từ", req: "- Tốt nghiệp chuyên ngành KT\n- Sử dụng thành thạo MISA/Excel\n- Trung thực, cẩn thận", ben: "- Lương thưởng tháng 13\n- Đóng BHXH đầy đủ\n- Nghỉ lễ theo quy định" },
            "sale": { desc: "- Tìm kiếm khách hàng tiềm năng\n- Tư vấn sản phẩm & chốt hợp đồng\n- Chăm sóc khách hàng sau bán hàng", req: "- Giao tiếp tốt, tự tin\n- Có kinh nghiệm sale là lợi thế\n- Chịu được áp lực doanh số", ben: "- Hoa hồng hấp dẫn (3-10%)\n- Thưởng nóng theo tuần/tháng\n- Du lịch hàng năm cùng công ty" },
            "it": { desc: "- Phát triển hệ thống Web/App\n- Bảo trì và xử lý lỗi hệ thống\n- Nghiên cứu công nghệ mới", req: "- Am hiểu JavaScript/React/NodeJS\n- Tư duy logic tốt\n- Đọc hiểu tài liệu tiếng Anh", ben: "- Lương Up-to 30M\n- Môi trường làm việc trẻ trung\n- Cấp máy tính cấu hình cao" }
        };

        function suggestContent() {
            const job = document.getElementById('inJob').value.toLowerCase();
            for (let key in suggestions) {
                if (job.includes(key)) {
                    document.getElementById('inDesc').value = suggestions[key].desc;
                    document.getElementById('inReq').value = suggestions[key].req;
                    document.getElementById('inBenefit').value = suggestions[key].ben;
                    updatePoster();
                    return;
                }
            }
            alert("Vị trí này chưa có mẫu sẵn, bạn hãy tự nhập nhé!");
        }

        // 2. TỰ PHỐI MÀU THÔNG MINH (Color Palette Engine)
        const colorThemes = ["#3b82f6", "#ef4444", "#10b981", "#fbbf24", "#a855f7", "#ec4899", "#06b6d4"];
        
        function updatePoster() {
            const ids = ['inJob','inQty','inSalary','inCompany','inPhone','inDesc','inReq','inBenefit'];
            ids.forEach(id => {
                const val = document.getElementById(id).value;
                document.getElementById('out' + id.substring(2)).innerText = val || "...";
            });
        }

        async function generateAI() {
            const key = document.getElementById('aiKey').value || document.getElementById('inJob').value || "Office";
            const img = document.getElementById('pBg');
            
            // Xoay vòng màu theme mỗi lần đổi ảnh cho "hợp" vibe
            const randomColor = colorThemes[Math.floor(Math.random() * colorThemes.length)];
            document.documentElement.style.setProperty('--theme', randomColor);

            img.style.opacity = "0";
            const seed = Math.floor(Math.random() * 1000);
            img.src = `https://image.pollinations.ai/prompt/${encodeURIComponent(key + ' professional cinematic photography')}?width=1000&height=1400&nologo=true&seed=${seed}`;
            
            img.onload = () => img.style.opacity = "0.6";
        }

        async function download() {
            const canvas = await html2canvas(document.getElementById('poster'), { scale: 3, useCORS: true });
            const link = document.createElement('a');
            link.download = 'Poster_AI_V11.png';
            link.href = canvas.toDataURL();
            link.click();
        }
    </script>
</body>
</html>
