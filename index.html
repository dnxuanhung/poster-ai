<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Poster Pro V8 - Smart Translation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Be+Vietnam+Pro:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --p-width: 420px; --p-height: 594px; }
        body { background: #020617; color: #f8fafc; font-family: 'Be Vietnam Pro', sans-serif; overflow: hidden; }
        .poster-stage { width: var(--p-width); height: var(--p-height); background: #000; position: relative; overflow: hidden; box-shadow: 0 0 80px rgba(0,0,0,0.6); }
        .layer-item { position: absolute; cursor: move; z-index: 10; user-select: none; border: 2px dashed transparent; }
        .layer-item.active { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
        .resizer { width: 12px; height: 12px; background: #3b82f6; position: absolute; right: -6px; bottom: -6px; border-radius: 50%; display: none; cursor: nwse-resize; border: 2px solid white; }
        .active .resizer { display: block; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(51, 65, 85, 0.5); }
        .btn-ai { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); transition: all 0.3s; }
        .btn-ai:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4); }
        .loader { border: 2px solid transparent; border-top: 2px solid #fff; border-radius: 50%; width: 14px; height: 14px; animation: spin 0.8s linear infinite; display: inline-block; margin-right: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex h-screen">

    <aside class="w-80 glass border-r p-6 flex flex-col gap-6 overflow-y-auto">
        <div>
            <h1 class="text-2xl font-black bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">AI STUDIO V8</h1>
            <p class="text-[9px] text-slate-500 tracking-[0.2em] uppercase font-bold">Smart Translation Engine</p>
        </div>

        <section class="space-y-4">
            <div class="p-4 bg-white/5 rounded-2xl border border-white/10 space-y-4">
                <header class="flex items-center gap-2 text-indigo-400">
                    <span class="text-lg">🤖</span>
                    <label class="text-[11px] font-black uppercase tracking-wider">AI Jobs-to-Image</label>
                </header>

                <div class="space-y-2">
                    <span class="text-[10px] text-slate-400">Nhập vị trí tuyển dụng (Tiếng Việt):</span>
                    <input type="text" id="jobInput" placeholder="Ví dụ: Kỹ sư phần mềm..." 
                           class="w-full bg-black/50 border border-slate-700 p-3 rounded-xl text-xs outline-none focus:border-indigo-500">
                </div>

                <button onclick="smartGenerateBackground()" id="btnGenerate" class="w-full btn-ai py-3 rounded-xl font-bold text-xs flex items-center justify-center">
                    TỰ ĐỘNG SINH ẢNH
                </button>
                <div id="aiStatus" class="text-[9px] text-slate-500 text-center hidden">Đang dịch thuật và tìm kiếm...</div>
            </div>
        </section>

        <section class="space-y-3">
            <button onclick="addNewText('VỊ TRÍ MỚI', '24px', '900')" class="w-full bg-slate-800 p-3 rounded-xl text-xs hover:bg-slate-700 transition-all">+ Thêm văn bản</button>
            <button onclick="downloadPoster()" class="w-full bg-emerald-600 py-4 rounded-xl font-black text-xs shadow-lg shadow-emerald-900/20 mt-4 uppercase tracking-widest">Xuất File 4K</button>
        </section>
    </aside>

    <main class="flex-1 bg-[#050505] flex items-center justify-center p-10">
        <div id="poster" class="poster-stage" onclick="deselectAll(event)">
            <img id="mainBg" src="https://images.unsplash.com/photo-1497215728101-856f4ea42174?q=80&w=1200" 
                 class="absolute inset-0 w-full h-full object-cover transition-all duration-1000" crossorigin="anonymous">
            <div class="absolute inset-0 bg-gradient-to-t from-black via-black/20 to-transparent"></div>
            
            <div id="jobLayer" class="layer-item text-center" style="top:250px; left:0; width:100%;">
                <h2 id="jobDisplay" style="font-size:28px; color:white; font-weight:900; letter-spacing:1px; text-transform:uppercase;">Vị trí tuyển dụng</h2>
            </div>
        </div>
    </main>

    <aside class="w-80 glass border-l p-6">
        <div id="editor" class="hidden space-y-6">
            <h3 class="text-[11px] font-black text-yellow-500 uppercase tracking-widest">Chỉnh sửa Layer</h3>
            <textarea id="editTxt" class="w-full bg-black/50 border border-slate-700 p-3 rounded-xl text-xs outline-none focus:border-blue-500 min-h-[100px]"></textarea>
            <div class="grid grid-cols-2 gap-4">
                <input type="number" id="editSize" class="bg-black/50 border border-slate-700 p-2 rounded-lg text-xs">
                <input type="color" id="editColor" class="w-full h-9 bg-transparent cursor-pointer">
            </div>
            <button onclick="deleteLayer()" class="w-full py-3 text-red-500 text-[10px] font-bold uppercase border border-red-500/20 rounded-xl hover:bg-red-500 hover:text-white transition-all">Xóa phần tử</button>
        </div>
        <div id="noSelect" class="text-center py-20 text-slate-600 italic text-xs">Hãy chọn một phần tử trên poster</div>
    </aside>

    <script>
        // 1. TỪ ĐIỂN DỊCH THUẬT THÔNG MINH (Có thể mở rộng thêm)
        const jobDictionary = {
            "kế toán": "professional modern accounting office with calculators and documents",
            "kỹ sư": "construction site with engineer wearing helmet, blueprints, professional",
            "phần mềm": "software developer workspace with multiple monitors and code, dark tech vibe",
            "it": "modern data center server room with blue neon lights",
            "marketing": "creative agency office with brainstorming whiteboards and colorful sticky notes",
            "bán hàng": "modern luxury retail store interior, professional sales environment",
            "giám đốc": "high-end luxury executive office, city view through window, cinematic",
            "nhân sự": "professional interview room, people shaking hands, bright friendly office",
            "đầu bếp": "professional restaurant kitchen with chefs cooking, motion blur, warm lighting",
            "bác sĩ": "modern high-tech hospital corridor or medical clinic, clean professional",
            "giáo viên": "modern classroom or library background, academic and bright"
        };

        // 2. HÀM XỬ LÝ CHÍNH
        async function smartGenerateBackground() {
            const jobTitle = document.getElementById('jobInput').value.toLowerCase().trim();
            const btn = document.getElementById('btnGenerate');
            const status = document.getElementById('aiStatus');
            const mainBg = document.getElementById('mainBg');
            const jobDisplay = document.getElementById('jobDisplay');

            if (!jobTitle) return alert("Vui lòng nhập vị trí công việc!");

            // Cập nhật text lên Poster ngay lập tức
            jobDisplay.innerText = jobTitle;

            // Bật hiệu ứng loading
            btn.disabled = true;
            btn.innerHTML = `<span class="loader"></span> ĐANG XỬ LÝ...`;
            status.classList.remove('hidden');

            // Tìm kiếm trong từ điển, nếu không có thì dịch thô
            let englishKeyword = "";
            let found = false;
            for (let key in jobDictionary) {
                if (jobTitle.includes(key)) {
                    englishKeyword = jobDictionary[key];
                    found = true;
                    break;
                }
            }

            // Nếu không có trong từ điển, tạo prompt mặc định
            if (!found) {
                englishKeyword = `${jobTitle} professional workplace environment, cinematic lighting, high resolution`;
            }

            // Gọi API sinh ảnh
            const finalPrompt = encodeURIComponent(englishKeyword);
            const imageUrl = `https://image.pollinations.ai/prompt/${finalPrompt}?width=1200&height=1600&nologo=true&seed=${Math.floor(Math.random()*9999)}`;

            mainBg.style.filter = "brightness(0.2) blur(10px)";

            const imgLoader = new Image();
            imgLoader.crossOrigin = "anonymous";
            imgLoader.src = imageUrl;

            imgLoader.onload = () => {
                mainBg.src = imageUrl;
                mainBg.style.filter = "brightness(0.6) blur(0px)";
                btn.disabled = false;
                btn.innerHTML = `TỰ ĐỘNG SINH ẢNH`;
                status.classList.add('hidden');
            };
        }

        // --- CÁC HÀM CƠ BẢN ---
        let activeLayer = null;
        function initDraggable(el) {
            let isDrag = false, isResize = false, sx, sy, sl, st, sw;
            el.addEventListener('mousedown', e => {
                e.stopPropagation(); setActive(el);
                if(e.target.classList.contains('resizer')) isResize = true;
                else isDrag = true;
                sx = e.clientX; sy = e.clientY;
                sl = el.offsetLeft; st = el.offsetTop; sw = el.offsetWidth;
            });
            document.addEventListener('mousemove', e => {
                if(!isDrag && !isResize) return;
                const dx = e.clientX - sx; const dy = e.clientY - sy;
                if(isDrag) { el.style.left = sl + dx + 'px'; el.style.top = st + dy + 'px'; }
                if(isResize) { el.style.width = sw + dx + 'px'; }
            });
            document.addEventListener('mouseup', () => { isDrag = isResize = false; });
        }

        function setActive(el) {
            deselectAll(); activeLayer = el;
            el.classList.add('active');
            document.getElementById('editor').classList.remove('hidden');
            document.getElementById('noSelect').classList.add('hidden');
            const target = el.querySelector('h1, h2, div:not(.resizer)') || el;
            document.getElementById('editTxt').value = target.innerText;
            document.getElementById('editSize').value = parseInt(window.getComputedStyle(target).fontSize);
        }

        function deselectAll(e) {
            if(e && e.target.closest('.layer-item')) return;
            document.querySelectorAll('.layer-item').forEach(l => l.classList.remove('active'));
            activeLayer = null;
            document.getElementById('editor').classList.add('hidden');
            document.getElementById('noSelect').classList.remove('hidden');
        }

        function addNewText(txt, size, weight) {
            const div = document.createElement('div');
            div.className = 'layer-item';
            div.style.top = '100px'; div.style.left = '50px'; div.style.width = '300px';
            div.innerHTML = `<div style="font-size:${size}; font-weight:${weight}; color:white; text-align:center; font-family:'Montserrat'">${txt}</div><div class="resizer"></div>`;
            document.getElementById('poster').appendChild(div);
            initDraggable(div);
            setActive(div);
        }

        document.getElementById('editTxt').oninput = (e) => {
            if(!activeLayer) return;
            const t = activeLayer.querySelector('h1, h2, div:not(.resizer)') || activeLayer;
            t.innerText = e.target.value;
        };

        document.getElementById('editSize').oninput = (e) => {
            if(!activeLayer) return;
            const t = activeLayer.querySelector('h1, h2, div:not(.resizer)') || activeLayer;
            t.style.fontSize = e.target.value + 'px';
        };

        document.getElementById('editColor').oninput = (e) => {
            if(!activeLayer) return;
            const t = activeLayer.querySelector('h1, h2, div:not(.resizer)') || activeLayer;
            t.style.color = e.target.value;
        };

        function deleteLayer() { if(activeLayer) { activeLayer.remove(); deselectAll(); } }

        async function downloadPoster() {
            deselectAll();
            const canvas = await html2canvas(document.getElementById('poster'), { scale: 3, useCORS: true });
            const link = document.createElement('a');
            link.download = `Poster_Professional.png`;
            link.href = canvas.toDataURL();
            link.click();
        }

        document.querySelectorAll('.layer-item').forEach(initDraggable);
    </script>
</body>
</html>
