<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siêu Công Cụ Thiết Kế Poster AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Be+Vietnam+Pro:wght@400;700&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --p-width: 450px; --p-height: 630px; }
        body { background: #020617; color: #f8fafc; font-family: 'Be Vietnam Pro', sans-serif; }
        
        /* Khung chứa Poster */
        .poster-canvas { 
            width: var(--p-width); height: var(--p-height); 
            background: #000; position: relative; overflow: hidden;
            box-shadow: 0 0 50px rgba(59, 130, 246, 0.2);
            margin: auto; border-radius: 8px;
        }

        /* Thành phần có thể kéo thả */
        .draggable { position: absolute; cursor: move; z-index: 10; padding: 5px; }
        .draggable:hover { outline: 2px solid #6366f1; background: rgba(99, 102, 241, 0.1); border-radius: 4px; }
        
        /* Lớp nền */
        .bg-layer { position: absolute; inset: 0; z-index: 0; }
        .bg-layer img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.7); }
        .overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.8) 100%); z-index: 1; }

        /* Tiện ích */
        [contenteditable="true"]:focus { background: rgba(255,255,255,0.1); outline: none; border-radius: 4px; }
        .admin-glow { border: 1px solid #8b5cf6; box-shadow: 0 0 15px rgba(139, 92, 246, 0.3); }
    </style>
</head>
<body class="p-4 min-h-screen flex flex-col lg:flex-row justify-center items-start gap-8">

    <div class="w-full lg:w-[380px] space-y-5 bg-slate-900/80 p-6 rounded-3xl border border-slate-800 backdrop-blur-xl">
        <div class="border-b border-slate-800 pb-4">
            <h1 class="text-2xl font-black text-blue-500 tracking-tighter">POSTER AI PRO</h1>
            <p class="text-[10px] text-slate-500 uppercase tracking-widest">Hệ thống Admin thông minh v3.0</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="text-xs font-bold text-slate-400">Vị trí tuyển dụng</label>
                <input type="text" id="jobTitleInp" placeholder="Ví dụ: Designer, Kế toán..." 
                       class="w-full bg-black/50 border border-slate-700 p-3 rounded-xl mt-1 focus:border-blue-500 outline-none transition-all"
                       oninput="updateText('jobTitle', this.value); triggerAI(this.value)">
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-xs font-bold text-slate-400">Mức lương</label>
                    <input type="text" id="salaryInp" placeholder="Thỏa thuận" 
                           class="w-full bg-black/50 border border-slate-700 p-3 rounded-xl mt-1 text-sm outline-none"
                           oninput="updateText('salaryVal', this.value)">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-400">Logo</label>
                    <input type="file" id="logoInp" class="hidden" accept="image/*" onchange="loadLogo(event)">
                    <button onclick="document.getElementById('logoInp').click()" class="w-full bg-slate-800 p-3 rounded-xl mt-1 text-xs font-bold hover:bg-slate-700 transition-all">📁 Chọn Logo</button>
                </div>
            </div>

            <div>
                <label class="text-xs font-bold text-slate-400">Yêu cầu công việc</label>
                <textarea id="descInp" rows="4" class="w-full bg-black/50 border border-slate-700 p-3 rounded-xl mt-1 text-sm outline-none" 
                          placeholder="• Nhập các yêu cầu tại đây..." oninput="updateText('jobDesc', this.value)"></textarea>
            </div>
        </div>

        <div class="flex gap-2">
            <button onclick="downloadPoster()" class="flex-1 bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-black uppercase tracking-tighter transition-all">Xuất Ảnh 4K</button>
            <button onclick="location.reload()" class="bg-slate-800 px-5 rounded-2xl hover:bg-red-900/30 transition-all">🔄</button>
        </div>
    </div>

    <div id="poster" class="poster-canvas">
        <div class="bg-layer"><img id="bgImg" src="https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&q=80&w=1000"></div>
        <div class="overlay"></div>

        <div id="groupLogo" class="draggable" style="top: 40px; left: 40px; width: 70px;">
            <img id="logoPreview" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M12 2L2 7l10 5 10-5-10-5z'/%3E%3C/svg%3E" class="w-full drop-shadow-lg">
        </div>

        <div id="groupHeader" class="draggable text-center" style="top: 100px; left: 0; width: 100%;">
            <p id="subTitle" style="font-size: 14px; letter-spacing: 6px; color: #60a5fa; font-weight: 700;">WE ARE HIRING</p>
            <h1 id="jobTitle" contenteditable="true" style="font-size: 48px; font-family: 'Montserrat'; font-weight: 900; line-height: 1; margin-top: 10px;">DESIGNER</h1>
        </div>

        <div id="groupInfo" class="draggable" style="top: 280px; left: 45px; width: 360px; border-left: 3px solid #60a5fa; padding-left: 20px;">
            <div id="jobDesc" contenteditable="true" style="font-size: 15px; line-height: 1.8; white-space: pre-line;">
                • Có tư duy thẩm mỹ tốt
                • Sử dụng thành thạo công cụ AI
                • Làm việc tại văn phòng Q1
            </div>
        </div>

        <div id="groupSalary" class="draggable" style="top: 460px; left: 0px; background: #2563eb; padding: 15px 40px; border-radius: 0 40px 40px 0;">
            <p style="font-size: 10px; font-weight: 700; opacity: 0.8;">MỨC LƯƠNG</p>
            <span id="salaryVal" contenteditable="true" style="font-size: 26px; font-weight: 900;">15 - 25 TRIỆU</span>
        </div>

        <div id="groupFooter" class="draggable text-center" style="top: 570px; left: 0; width: 100%;">
            <p id="contactInfo" contenteditable="true" style="font-size: 11px; opacity: 0.6;">📩 hr@company.com | 🌐 www.website.com</p>
        </div>
    </div>

    <div id="superAdmin" style="position:fixed; bottom:20px; right:20px; z-index:10000;">
        <div id="adminChat" style="display:none; width:340px; background:#0f172a; border:1px solid #334155; border-radius:24px; flex-direction:column; overflow:hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);" class="admin-glow">
            <div class="bg-indigo-600 p-4 font-bold flex justify-between">
                <span>🪄 TRỢ LÝ ADMIN AI</span>
                <button onclick="toggleAdmin()">✕</button>
            </div>
            <div id="statusLog" class="h-24 p-3 text-[10px] bg-black/40 font-monospace overflow-y-auto text-blue-300 border-b border-slate-800">
                > Chào Admin! Nhấn Alt + A để ra lệnh.
            </div>
            <div class="p-4 bg-slate-900">
                <textarea id="aiRequest" placeholder="Ví dụ: Đổi màu nền poster sang đỏ đậm..." 
                    class="w-full h-20 bg-slate-800 border border-slate-700 rounded-xl p-3 text-sm outline-none focus:border-indigo-500"></textarea>
                <button onclick="callGemini()" id="btnAction" class="w-full mt-3 bg-indigo-600 hover:bg-indigo-500 py-3 rounded-xl font-bold transition-all">THỰC THI LỆNH</button>
            </div>
        </div>
        <button onclick="toggleAdmin()" class="bg-indigo-600 hover:bg-indigo-500 p-4 rounded-full shadow-2xl transition-all active:scale-90">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="white" viewBox="0 0 256 256"><path d="M216,144a8,8,0,0,1-8,8H152a8,8,0,0,1,0-16h56A8,8,0,0,1,216,144ZM104,88H48a8,8,0,0,0,0,16h56a8,8,0,0,0,0-16Zm104,16h-56a8,8,0,0,0,0,16h56a8,8,0,0,0,0-16Zm-64,48H48a8,8,0,0,0,0,16h96a8,8,0,0,0,0-16Z"></path></svg>
        </button>
    </div>

    <script>
        // 1. CẤU HÌNH THEME NGÀNH NGHỀ
        const AI_THEMES = {
            tech: { keywords: ['it', 'dev', 'code', 'lập trình', 'phần mềm', 'web', 'data'], bg: 'https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=1000', color: '#60a5fa' },
            creative: { keywords: ['design', 'ảnh', 'video', 'content', 'sáng tạo', 'designer'], bg: 'https://images.unsplash.com/photo-1558655146-d09347e92766?q=80&w=1000', color: '#f43f5e' },
            sale: { keywords: ['bán hàng', 'sale', 'kinh doanh', 'tư vấn'], bg: 'https://images.unsplash.com/photo-1556740734-7f9a2b7a0f42?q=80&w=1000', color: '#fbbf24' }
        };

        function updateText(id, val) { document.getElementById(id).innerText = val || "NỘI DUNG"; }
        
        function triggerAI(val) {
            const input = val.toLowerCase();
            for (let k in AI_THEMES) {
                if (AI_THEMES[k].keywords.some(key => input.includes(key))) {
                    const theme = AI_THEMES[k];
                    document.getElementById('bgImg').src = theme.bg;
                    document.getElementById('subTitle').style.color = theme.color;
                    document.getElementById('groupSalary').style.background = theme.color;
                    document.getElementById('groupInfo').style.borderColor = theme.color;
                    return;
                }
            }
        }

        function loadLogo(e) {
            const reader = new FileReader();
            reader.onload = () => document.getElementById('logoPreview').src = reader.result;
            reader.readAsDataURL(e.target.files[0]);
        }

        // 2. KÉO THẢ
        function initDraggable() {
            document.querySelectorAll('.draggable').forEach(el => {
                el.onmousedown = (e) => {
                    if (e.target.contentEditable === 'true') return;
                    let sX = e.clientX - el.getBoundingClientRect().left;
                    let sY = e.clientY - el.getBoundingClientRect().top;
                    document.onmousemove = (ev) => {
                        let p = document.getElementById('poster').getBoundingClientRect();
                        el.style.left = (ev.clientX - p.left - sX) + 'px';
                        el.style.top = (ev.clientY - p.top - sY) + 'px';
                    };
                    document.onmouseup = () => document.onmousemove = null;
                };
            });
        }
        initDraggable();

        // 3. KẾT NỐI AI GEMINI (CẦU CHÌ 3 LỚP)
        function toggleAdmin() { const c = document.getElementById('adminChat'); c.style.display = c.style.display==='none'?'flex':'none'; }
        document.addEventListener('keydown', e => { if(e.altKey && e.key==='a') toggleAdmin(); });

        async function callGemini() {
            const req = document.getElementById('aiRequest').value;
            const log = document.getElementById('statusLog');
            const btn = document.getElementById('btnAction');
            
            // DÁN KEY CỦA BẠN VÀO ĐÂY
            const KEY = "AIzaSyB62ocJefkSAp8LlfD1YhlYMQQ02Tde6mI"; 

            if(!req.trim()) return;
            btn.disabled = true; log.innerHTML = "> ⏳ Đang khởi động AI...";

            const versions = [
                { url: "v1beta", model: "gemini-1.5-flash" },
                { url: "v1", model: "gemini-1.5-flash" },
                { url: "v1beta", model: "gemini-pro" }
            ];

            let done = false;
            for (let v of versions) {
                if (done) break;
                try {
                    log.innerHTML = `> 📡 Thử kết nối: ${v.model} (${v.url})...`;
                    const res = await fetch(`https://generativelanguage.googleapis.com/${v.url}/models/${v.model}:generateContent?key=${KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Viết mã JS thay đổi giao diện web theo yêu cầu: "${req}". Tác động vào ID: #poster, #jobTitle, #groupSalary, #groupInfo, #bgImg. Chỉ trả về mã JS, không giải thích, không nháy ngược.` }] }]
                        })
                    });
                    const data = await res.json();
                    if(data.candidates) {
                        let code = data.candidates[0].content.parts[0].text.replace(/```javascript|```js|```/gi, '').trim();
                        new Function(code)();
                        log.innerHTML = `> ✅ Thành công! Đã thực thi lệnh bằng ${v.model}.`;
                        done = true;
                        document.getElementById('aiRequest').value = "";
                    }
                } catch (e) { console.error(e); }
            }
            if(!done) log.innerHTML = "> ❌ Lỗi: Không thể kết nối AI. Kiểm tra API Key!";
            btn.disabled = false;
        }

        function downloadPoster() {
            const p = document.getElementById('poster');
            html2canvas(p, { scale: 3, useCORS: true }).then(c => {
                const l = document.createElement('a');
                l.download = 'AI_Poster_Pro.png';
                l.href = c.toDataURL();
                l.click();
            });
        }
    </script>
</body>
</html>
