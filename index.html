<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI DESIGN STUDIO V5.0 - CHUẨN ĐẦY ĐỦ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Playfair+Display:wght@900&family=Bangers&family=Dancing+Script:wght@700&family=Be+Vietnam+Pro:wght@400;700&family=Pacifico&family=Oswald:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { --p-width: 450px; --p-height: 630px; }
        body { background: #020617; color: #f8fafc; font-family: 'Be Vietnam Pro', sans-serif; }
        
        /* Canvas */
        .poster-canvas { 
            width: var(--p-width); height: var(--p-height); 
            background: #1e293b; position: relative; overflow: hidden;
            box-shadow: 0 0 60px rgba(59, 130, 246, 0.25); border-radius: 12px;
        }
        .bg-layer { position: absolute; inset: 0; z-index: 0; }
        .bg-layer img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.6); }
        .overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.85)); z-index: 1; pointer-events: none; }
        
        /* Phần tử có thể chỉnh sửa */
        .editable-el { position: absolute; cursor: grab; z-index: 10; padding: 10px; border: 2px dashed transparent; min-width: 50px; }
        .editable-el:hover { border-color: rgba(255, 255, 255, 0.4); }
        .editable-el.selected { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); border-radius: 8px; z-index: 20; }
        [contenteditable="true"] { outline: none; cursor: text; }
        
        /* Loading animation */
        .loader { border: 3px solid #334155; border-top: 3px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .font-item { transition: all 0.2s; border: 1px solid #1e293b; }
        .font-item:hover { border-color: #3b82f6; background: #1e293b; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6">

    <header class="w-full max-w-6xl mb-8 flex flex-wrap justify-between items-center bg-slate-900/90 p-6 rounded-3xl border border-slate-800 backdrop-blur-xl">
        <div>
            <h1 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-500">AI DESIGN V5.0</h1>
            <p class="text-[10px] text-slate-500 uppercase tracking-[0.2em] font-bold">The Complete Design Tool</p>
        </div>
        <button onclick="downloadPoster()" class="bg-indigo-600 hover:bg-indigo-500 px-8 py-3 rounded-2xl font-black shadow-lg shadow-indigo-500/20 transition-all text-sm">📸 XUẤT ẢNH 4K</button>
    </header>

    <div class="flex flex-col lg:flex-row gap-10 w-full max-w-7xl justify-center items-start">
        
        <div class="w-full lg:w-80 space-y-6">
            <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800 shadow-xl">
                <label class="text-[10px] font-black text-indigo-400 uppercase mb-3 block tracking-widest">1. Nhập vị trí tuyển dụng</label>
                <input type="text" id="aiJobInput" placeholder="Ví dụ: Giám đốc Marketing, Shipper..." 
                       class="w-full bg-black border border-slate-700 p-4 rounded-2xl text-sm focus:border-indigo-500 outline-none text-white mb-4">
                <button id="btnGenerate" onclick="generateTemplates()" class="w-full bg-gradient-to-br from-indigo-600 to-blue-700 py-4 rounded-2xl font-bold text-sm hover:scale-[1.02] active:scale-95 transition-all shadow-xl">✨ TẠO Ý TƯỞNG AI</button>
                <div id="aiStatus" class="text-[10px] text-slate-500 mt-3 text-center italic font-medium">Hệ thống sẵn sàng</div>
            </div>

            <div id="templateContainer" class="hidden space-y-3">
                <p class="text-[10px] font-black text-slate-500 ml-2 uppercase">Chọn mẫu bạn thích:</p>
                <div id="templateList" class="space-y-2"></div>
            </div>
            
            <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800">
                <h2 class="font-bold text-xs text-green-400 mb-4 uppercase tracking-widest">➕ Thêm yếu tố</h2>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="addNewText()" class="bg-slate-800 hover:bg-slate-700 py-3 rounded-xl text-[10px] font-bold uppercase border border-slate-700">📝 Thêm Chữ</button>
                    <label class="bg-slate-800 hover:bg-slate-700 py-3 rounded-xl text-[10px] font-bold uppercase border border-slate-700 flex justify-center cursor-pointer">🖼️ Đổi Nền
                        <input type="file" class="hidden" accept="image/*" onchange="loadCustomImage(event, 'bgImg')">
                    </label>
                </div>
            </div>
        </div>

        <div id="poster" class="poster-canvas" onclick="deselectAll(event)">
            <div class="bg-layer"><img id="bgImg" src="https://images.unsplash.com/photo-1497215728101-856f4ea42174?q=80&w=1000" crossorigin="anonymous"></div>
            <div class="overlay"></div>

            <div id="el-subtitle" class="editable-el" style="top: 70px; left: 0px; width: 100%; text-align: center;">
                <div contenteditable="true" style="color: #60a5fa; font-size: 15px; letter-spacing: 6px; font-weight: 700; font-family: 'Be Vietnam Pro';">WE ARE HIRING</div>
            </div>

            <div id="el-title" class="editable-el" style="top: 100px; left: 0px; width: 100%; text-align: center;">
                <div contenteditable="true" style="color: #ffffff; font-size: 55px; font-family: 'Montserrat'; font-weight: 900; line-height: 1; text-transform: uppercase;">YOUR JOB</div>
            </div>

            <div id="el-info" class="editable-el" style="top: 280px; left: 45px; width: 360px; border-left: 5px solid #60a5fa; padding-left: 20px;">
                <div contenteditable="true" style="color: #e2e8f0; font-size: 16px; line-height: 1.8; white-space: pre-line; font-family: 'Be Vietnam Pro';">
                    • Nhập mô tả công việc 1
                    • Nhập mô tả công việc 2
                    • Nhập quyền lợi hấp dẫn
                </div>
            </div>

            <div id="el-salary" class="editable-el" style="top: 480px; left: 0px; background: #2563eb; padding: 15px 45px; border-radius: 0 50px 50px 0;">
                <div contenteditable="true" style="color: #ffffff; font-size: 26px; font-weight: 900; font-family: 'Oswald';">MỨC LƯƠNG</div>
            </div>
        </div>

        <div class="w-full lg:w-80 bg-slate-900 p-6 rounded-3xl border border-slate-800 shadow-2xl" id="propertiesPanel">
            <h2 class="font-bold text-xs text-yellow-500 mb-6 uppercase tracking-widest">🛠️ Chỉnh sửa chi tiết</h2>
            
            <div id="noSelectMsg" class="text-xs text-slate-600 italic text-center py-20">Chọn nội dung trên poster để thay đổi font, màu, cỡ...</div>
            
            <div id="editControls" class="space-y-6 hidden">
                <div>
                    <label class="text-[10px] text-slate-500 uppercase font-black block mb-3 italic">Font Chữ Nghệ Thuật</label>
                    <div class="grid grid-cols-1 gap-1 max-h-40 overflow-y-auto pr-2 custom-scrollbar">
                        <button onclick="applyStyle('fontFamily', 'Montserrat')" class="font-item text-left p-2 rounded text-[11px]" style="font-family: 'Montserrat';">Montserrat (Đậm)</button>
                        <button onclick="applyStyle('fontFamily', 'Bangers')" class="font-item text-left p-2 rounded text-[11px]" style="font-family: 'Bangers';">Bangers (Cá tính)</button>
                        <button onclick="applyStyle('fontFamily', 'Dancing Script')" class="font-item text-left p-2 rounded text-[11px]" style="font-family: 'Dancing Script';">Dancing (Viết tay)</button>
                        <button onclick="applyStyle('fontFamily', 'Pacifico')" class="font-item text-left p-2 rounded text-[11px]" style="font-family: 'Pacifico';">Pacifico (Nghệ thuật)</button>
                        <button onclick="applyStyle('fontFamily', 'Playfair Display')" class="font-item text-left p-2 rounded text-[11px]" style="font-family: 'Playfair Display';">Playfair (Sang trọng)</button>
                        <button onclick="applyStyle('fontFamily', 'Oswald')" class="font-item text-left p-2 rounded text-[11px]" style="font-family: 'Oswald';">Oswald (Gọn)</button>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] text-slate-500 uppercase font-black block mb-2">Kích thước: <span id="sizeVal">24</span>px</label>
                    <input type="range" id="fontSizeSlider" min="10" max="150" class="w-full accent-indigo-500" oninput="document.getElementById('sizeVal').innerText=this.value; applyStyle('fontSize', this.value + 'px')">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] text-slate-500 uppercase font-black block mb-2">Màu Chữ</label>
                        <input type="color" id="colorPicker" class="w-full h-10 rounded-lg bg-transparent border-none cursor-pointer" oninput="applyStyle('color', this.value)">
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-500 uppercase font-black block mb-2">Màu Nền</label>
                        <input type="color" id="bgColorPicker" class="w-full h-10 rounded-lg bg-transparent border-none cursor-pointer" oninput="applyStyle('background', this.value)">
                    </div>
                </div>

                <div class="pt-6 border-t border-slate-800 flex flex-col gap-2">
                    <button onclick="applyStyle('background', 'transparent')" class="w-full text-[10px] py-2 text-slate-400 hover:text-white underline">Xóa màu nền khối</button>
                    <button onclick="deleteSelected()" class="w-full bg-red-950/30 text-red-500 py-3 rounded-xl text-[10px] font-bold hover:bg-red-600 hover:text-white transition-all">🗑️ XÓA PHẦN TỬ</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CẤU HÌNH API
        const API_KEY = "AIzaSyCEL5yP8KwpBv_fDdf34aQZvyKgSRcCbeg"; 
        
        let templatesData = [];
        let selectedElement = null;

        // 1. HÀM TẠO NỘI DUNG AI
        async function generateTemplates() {
            const jobTitle = document.getElementById('aiJobInput').value.trim();
            if(!jobTitle) return alert("Bạn chưa nhập vị trí tuyển dụng!");

            const btn = document.getElementById('btnGenerate');
            const status = document.getElementById('aiStatus');
            btn.innerHTML = `<span class="loader"></span> ĐANG XỬ LÝ...`;
            btn.disabled = true;

            // Dữ liệu dự phòng (Nếu API lỗi vẫn có mẫu đẹp để dùng)
            const fallback = [
                { themeName: "Professional Blue", bgKeyword: "modern corporate office", primaryColor: "#2563eb", textColor: "#ffffff", title: jobTitle, sub: "WE ARE HIRING", desc: "• 3+ years experience\n• Great communication\n• Creative mindset", salary: "15 - 25 TRIỆU" },
                { themeName: "Creative Pink", bgKeyword: "creative studio neon", primaryColor: "#db2777", textColor: "#ffffff", title: jobTitle, sub: "JOIN OUR TEAM", desc: "• Passionate design\n• High responsibility\n• Team player", salary: "COMPETITIVE" },
                { themeName: "Elegant Dark", bgKeyword: "minimalist dark workspace", primaryColor: "#4f46e5", textColor: "#ffffff", title: jobTitle, sub: "WE WANT YOU", desc: "• Professional skills\n• Innovative thinking\n• Fast learner", salary: "NEGOTIABLE" }
            ];

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Create 3 hiring poster concepts for: ${jobTitle}. Return ONLY a JSON array of objects with: themeName, bgKeyword, primaryColor, textColor, title, sub, desc, salary. No prose.` }] }] })
                });

                const data = await res.json();
                if(data.error) throw new Error("API Error");

                let raw = data.candidates[0].content.parts[0].text.replace(/```json|```/gi, '').trim();
                templatesData = JSON.parse(raw);
                status.innerText = "✅ AI đã tạo xong mẫu!";
            } catch (e) {
                console.warn("Dùng mẫu dự phòng.");
                templatesData = fallback;
                status.innerHTML = "⚠️ <span class='text-yellow-500'>Dùng mẫu dự phòng (Check API Key)</span>";
            } finally {
                renderTemplates();
                btn.innerHTML = `✨ TẠO Ý TƯỞNG AI`;
                btn.disabled = false;
            }
        }

        // 2. HIỂN THỊ DANH SÁCH MẪU
        function renderTemplates() {
            const list = document.getElementById('templateList');
            list.innerHTML = '';
            templatesData.forEach((t, i) => {
                const b = document.createElement('button');
                b.className = "w-full p-4 rounded-2xl bg-slate-800/50 border border-slate-700 hover:border-indigo-500 transition-all flex items-center gap-4 text-left group";
                b.onclick = () => applyTemplate(i);
                b.innerHTML = `<div class="w-2 h-10 rounded-full" style="background:${t.primaryColor}"></div>
                               <div><div class="text-[11px] font-bold text-white">${t.themeName}</div><div class="text-[9px] text-slate-500">${t.bgKeyword}</div></div>`;
                list.appendChild(b);
            });
            document.getElementById('templateContainer').classList.remove('hidden');
            applyTemplate(0);
        }

        // 3. ÁP DỤNG MẪU VÀO POSTER
        function applyTemplate(i) {
            const t = templatesData[i];
            document.getElementById('bgImg').src = `https://image.pollinations.ai/prompt/${encodeURIComponent(t.bgKeyword)}?width=800&height=1200&nologo=true`;
            
            document.querySelector('#el-title div').innerText = t.title.toUpperCase();
            document.querySelector('#el-subtitle div').innerText = t.sub;
            document.querySelector('#el-subtitle div').style.color = t.primaryColor;
            
            const info = document.getElementById('el-info');
            info.querySelector('div').innerText = t.desc;
            info.style.borderColor = t.primaryColor;

            const sal = document.getElementById('el-salary');
            sal.querySelector('div').innerText = t.salary;
            sal.style.background = t.primaryColor;
            deselectAll();
        }

        // 4. HỆ THỐNG KÉO THẢ (DRAG & DROP)
        function makeDraggable(el) {
            let isDrag = false, sx, sy, il, it;
            el.addEventListener('mousedown', (e) => {
                selectElement(el);
                if (e.target.isContentEditable) return;
                isDrag = true;
                sx = e.clientX; sy = e.clientY;
                il = el.offsetLeft; it = el.offsetTop;
            });
            document.addEventListener('mousemove', (e) => {
                if (!isDrag) return;
                el.style.left = `${il + (e.clientX - sx)}px`;
                el.style.top = `${it + (e.clientY - sy)}px`;
            });
            document.addEventListener('mouseup', () => isDrag = false);
        }
        document.querySelectorAll('.editable-el').forEach(makeDraggable);

        // 5. CHỌN VÀ CHỈNH SỬA THUỘC TÍNH
        function selectElement(el) {
            deselectAll();
            selectedElement = el;
            el.classList.add('selected');
            document.getElementById('noSelectMsg').classList.add('hidden');
            document.getElementById('editControls').classList.remove('hidden');
            
            const inner = el.querySelector('div[contenteditable]');
            const style = window.getComputedStyle(inner || el);
            document.getElementById('fontSizeSlider').value = parseInt(style.fontSize);
            document.getElementById('sizeVal').innerText = parseInt(style.fontSize);
        }

        function deselectAll(e) {
            if(e && e.target.closest('.editable-el')) return;
            document.querySelectorAll('.editable-el').forEach(el => el.classList.remove('selected'));
            selectedElement = null;
            document.getElementById('noSelectMsg').classList.remove('hidden');
            document.getElementById('editControls').classList.add('hidden');
        }

        function applyStyle(p, v) {
            if(!selectedElement) return;
            const inner = selectedElement.querySelector('div[contenteditable]');
            if(['fontSize', 'color', 'fontFamily'].includes(p)) {
                if(inner) inner.style[p] = v;
            } else {
                selectedElement.style[p] = v;
            }
        }

        function addNewText() {
            const n = document.createElement('div');
            n.className = 'editable-el';
            n.style.top = '150px'; n.style.left = '50px';
            n.innerHTML = `<div contenteditable="true" style="color:#ffffff; font-size:24px; font-weight:bold; font-family:'Montserrat';">NỘI DUNG MỚI...</div>`;
            document.getElementById('poster').appendChild(n);
            makeDraggable(n);
            selectElement(n);
        }

        function deleteSelected() { if(selectedElement) { selectedElement.remove(); deselectAll(); } }

        function loadCustomImage(e, id) {
            const f = e.target.files[0];
            if(f) { const r = new FileReader(); r.onload = (ev) => document.getElementById(id).src = ev.target.result; r.readAsDataURL(f); }
        }

        function downloadPoster() {
            deselectAll();
            const btn = event.target;
            btn.innerText = "ĐANG XỬ LÝ...";
            html2canvas(document.getElementById('poster'), { scale: 3, useCORS: true }).then(c => {
                const l = document.createElement('a');
                l.download = `AI_Poster_${Date.now()}.png`;
                l.href = c.toDataURL("image/png");
                l.click();
                btn.innerText = "📸 XUẤT ẢNH 4K";
            });
        }
    </script>
</body>
</html>
